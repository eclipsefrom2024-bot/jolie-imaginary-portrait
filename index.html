<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#efe9df">
  <title>我的想像肖像｜莉．瓷藝博物館</title>
  <!-- v13-clean: one coherent mobile-safe build -->
  <link rel="stylesheet" href="style.css?v=13">
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div class="eyebrow">JOLIE MUSEUM × PICASSO IMAGINARY PORTRAITS</div>
      <h1>我的想像肖像</h1>
      <p>拼出一張不按規則的臉，留下你的夏日藝術記憶。</p>
      <small class="build-mark">v13</small>
    </header>

    <section class="controls-card">
      <h2>1. 選擇素材</h2>
      <div class="tabs" role="tablist">
        <button class="tab active" data-tab="faces" type="button">臉型</button>
        <button class="tab" data-tab="eyes" type="button">眼睛</button>
        <button class="tab" data-tab="features" type="button">五官</button>
        <button class="tab" data-tab="style" type="button">配件</button>
        <button class="tab" data-tab="decor" type="button">花紋</button>
      </div>
      <div id="assetGrid" class="asset-grid"></div>

      <h2>2. 背景與圖層</h2>
      <div id="bgPalette" class="bg-palette"></div>
      <div class="mini-actions">
        <button id="forwardBtn" type="button">往前一層</button>
        <button id="backBtn" type="button">往後一層</button>
        <button id="undoBtn" type="button">↶ 復原</button>
        <button id="resetBtn" type="button">重設</button>
        <button id="randomBtn" type="button">隨機靈感</button>
      </div>
      <div class="cafe-note">
        <strong>小提醒</strong><br>
        點選畫布物件後，可直接在物件下方按 <b>－</b> 縮小、<b>＋</b> 放大、旋轉、鎖定或刪除。
      </div>
    </section>

    <section class="canvas-card">
      <div class="canvas-topline">
        <span>3. 我的想像肖像畫</span>
        <span>點物件開始編輯</span>
      </div>
      <div id="artboard" class="artboard" aria-label="可編輯想像肖像畫布">
        <div id="objectLayer" class="object-layer"></div>
        <div id="toolbar" class="object-toolbar hidden">
          <button id="shrinkHandle" aria-label="縮小物件">－</button>
          <button id="scaleHandle" aria-label="放大物件">＋</button>
          <button id="rotateHandle" aria-label="旋轉物件">↻</button>
          <button id="lockHandle" aria-label="鎖定物件">🔒</button>
          <button id="deleteHandle" aria-label="刪除物件">×</button>
        </div>
        <div class="export-footer">
          <strong>我的想像肖像</strong>
          <span>PICASSO IMAGINARY PORTRAITS · 莉．瓷藝博物館</span>
          <small>2026.07.01–09.30 · #MyImaginaryPortrait #JolieMuseum</small>
        </div>
      </div>
    </section>

    <section class="download-zone">
      <button id="downloadBtn" class="download-final" type="button">儲存／分享我的肖像畫</button>
      <p>手機會開啟分享面板；選擇「儲存影像」即可存進相簿。</p>
    </section>
  </main>
  <script src="app.js?v=13"></script>
</body>
</html>
